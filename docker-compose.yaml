services:
  redis:
    image: redis:7-alpine           # or delete if you’ll use the Redis plugin
  rabbitmq:
    image: rabbitmq:3-management
  backend:
    build: ./backend
    command: uvicorn api:app --host 0.0.0.0 --port ${PORT:-8000}
    environment:
      PORT: 8000
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
  worker:
    build: ./backend
    command: uv run dramatiq --processes 4 --threads 4 run_agent_background
    environment:
      PORT: 8000
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
  frontend:
    build: ./frontend
    command: npm run start -- -p ${PORT:-3000}
    environment:
      PORT: 3000
      NEXT_PUBLIC_BACKEND_URL: http://backend:8000/api